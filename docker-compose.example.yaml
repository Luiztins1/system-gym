services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      system-gym:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://system-gym:5432/gmy
      SPRING_DATASOURCE_USERNAME: username
      SPRING_DATASOURCE_PASSWORD: password

  system-gym:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - ./Postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=gym
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username"]
      interval: 10s
      timeout: 5s
      retries: 5